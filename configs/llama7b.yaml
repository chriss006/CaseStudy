model_name: openlm-research/open_llama_7b_v2
output_dir: /kaggle/input/datasets/haehyunlee/llama7b-fewshot-stage2-ckpt/v1

seed: 42
max_seq_length: 512
num_train_epochs: 3
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 4

learning_rate: 2.0e-4
warmup_ratio: 0.03
weight_decay: 0.0
lr_scheduler_type: cosine

logging_steps: 10
max_steps: 2000
eval_steps: 50
save_steps: 100
save_total_limit: 3

# BitsAndBytes config
load_in_4bit: True
bnb_4bit_quant_type: "nf4"
bnb_4bit_compute_dtype: "float16"
bnb_4bit_use_double_quant: True

# LoRA hyperparameters
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - v_proj
