model_name: mistralai/Mistral-7B-Instruct-v0.2
output_dir: /kaggle/working/CaseStudy/outputs/mistral7b-noc-switch-qlora



seed: 42
max_seq_length: 1024
num_train_epochs: 3
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16

learning_rate: 2.0e-4
warmup_ratio: 0.03
weight_decay: 0.0
lr_scheduler_type: cosine

logging_steps: 5
eval_steps: 25
save_steps: 25
save_total_limit: 2

load_in_4bit: true
bnb_4bit_quant_type: nf4
bnb_4bit_compute_dtype: float16
bnb_4bit_use_double_quant: true

lora_r: 8
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj


